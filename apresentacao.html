<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SISPROJ SAES — Atualização SISPROJ v2</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B1120;--bg2:#111B2E;--bg3:#162234;--bg4:#1C2D42;
  --green:#2A9D8F;--green-d:#2A9D8F20;--blue:#1474B7;--opas:#0969C3;
  --orange:#D35400;--yellow:#F39C12;--purple:#8E44AD;--red:#CC2222;--teal:#17A2B8;
  --text:#E8ECF2;--text2:#9BB0C4;--muted:#5A7089;--border:#263D58;
  --font:'Sora',sans-serif;--mono:'IBM Plex Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
button{font-family:var(--font);cursor:pointer;border:none}
a{text-decoration:none;color:inherit}

/* ═══ TOP NAV ═══ */
.topnav{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(11,17,32,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);z-index:200;display:flex;align-items:center;padding:0 28px;gap:16px}
.topnav .logo{font-size:14px;font-weight:800;letter-spacing:-.02em;cursor:pointer;display:flex;align-items:center;gap:8px}
.topnav .logo span{color:var(--green)}
.topnav .nav-pills{display:flex;gap:4px;margin-left:24px;overflow-x:auto;flex:1}
.nav-pill{padding:6px 14px;border-radius:8px;font-size:11px;font-weight:600;color:var(--muted);background:transparent;transition:all .2s;white-space:nowrap;border:1px solid transparent}
.nav-pill:hover{color:var(--text);background:var(--bg3)}
.nav-pill.active{color:#fff;border-color:var(--green);background:var(--green)}

/* ═══ SECTIONS ═══ */
.section{min-height:100vh;padding:80px 28px 40px;position:relative}

/* ═══ HOME ═══ */
.home-hero{text-align:center;padding-top:60px;margin-bottom:48px}
.home-hero .label{font-size:12px;color:var(--green);font-weight:600;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px}
.home-hero h1{font-size:44px;font-weight:800;letter-spacing:-.03em;margin-bottom:10px}
.home-hero h1 span{background:linear-gradient(135deg,var(--green),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.home-hero p{font-size:15px;color:var(--muted);max-width:600px;margin:0 auto;line-height:1.7}
.home-hero .ver{display:inline-flex;padding:4px 16px;border-radius:20px;font-size:11px;font-weight:600;background:var(--green-d);color:var(--green);font-family:var(--mono);margin-top:16px}

.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px;max-width:1200px;margin:0 auto}
.home-card{background:var(--bg3);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:all .35s;cursor:pointer;position:relative}
.home-card:hover{transform:translateY(-6px);box-shadow:0 20px 48px rgba(0,0,0,.35);border-color:rgba(42,157,143,.4)}
.home-card .hc-bar{height:4px}
.home-card .hc-body{padding:24px}
.home-card .hc-icon{font-size:36px;margin-bottom:12px}
.home-card h3{font-size:18px;font-weight:700;margin-bottom:6px}
.home-card .hc-desc{font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:16px}
.home-card .hc-tags{display:flex;gap:6px;flex-wrap:wrap}
.home-card .tag{font-size:10px;padding:3px 10px;border-radius:8px;font-weight:600}
.home-card .hc-footer{padding:14px 24px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--muted)}
.home-card .hc-footer .go{color:var(--green);font-weight:600;display:flex;align-items:center;gap:4px}

/* ═══ MOCKUP PAGE ═══ */
.mockup-page{display:none}
.mockup-page.active{display:block}

.mp-header{max-width:1300px;margin:0 auto 28px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.mp-header .mp-num{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff}
.mp-header .mp-icon{font-size:36px}
.mp-header .mp-info{flex:1}
.mp-header h2{font-size:28px;font-weight:800;letter-spacing:-.02em}
.mp-header .mp-sub{font-size:13px;color:var(--muted)}
.mp-header .btn-back{padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;color:var(--text2);border:1px solid var(--border);background:transparent;transition:all .2s}
.mp-header .btn-back:hover{background:var(--bg3);color:var(--text)}

/* IFRAME CONTAINER */
.iframe-wrap{max-width:1300px;margin:0 auto 32px;border-radius:16px;overflow:hidden;border:2px solid var(--border);position:relative;background:var(--bg2)}
.iframe-wrap iframe{width:100%;height:720px;border:none;display:block}
.iframe-toolbar{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--bg3);border-bottom:1px solid var(--border)}
.iframe-toolbar .dots{display:flex;gap:6px}
.iframe-toolbar .dot{width:10px;height:10px;border-radius:50%}
.iframe-toolbar .url-bar{flex:1;padding:5px 14px;border-radius:6px;background:var(--bg);border:1px solid var(--border);font-size:11px;font-family:var(--mono);color:var(--muted)}
.iframe-toolbar .btn-fs{padding:4px 12px;border-radius:6px;background:var(--bg);border:1px solid var(--border);font-size:11px;color:var(--text2);cursor:pointer;transition:all .15s}
.iframe-toolbar .btn-fs:hover{background:var(--green);color:#fff;border-color:var(--green)}

/* ═══ FLOW SECTION ═══ */
.flow-section{max-width:1300px;margin:0 auto 40px}
.flow-title{font-size:18px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.flow-title .ft-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}

.flow-pipeline{display:flex;gap:0;align-items:stretch;overflow-x:auto;padding-bottom:12px}
.flow-step{flex:1;min-width:160px;position:relative;display:flex;flex-direction:column}
.flow-step-head{display:flex;align-items:center;gap:0;margin-bottom:12px}
.flow-step-circle{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0;z-index:1;position:relative}
.flow-step-line{flex:1;height:3px;margin:0 -2px}
.flow-step:last-child .flow-step-line{display:none}
.flow-step-body{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;flex:1}
.flow-step-body h5{font-size:12px;font-weight:700;margin-bottom:6px}
.flow-step-body p{font-size:10px;color:var(--muted);line-height:1.6}
.flow-step-body .fields{margin-top:8px;display:flex;flex-direction:column;gap:3px}
.flow-step-body .field-tag{font-size:9px;padding:2px 8px;border-radius:4px;background:var(--bg);color:var(--text2);font-family:var(--mono);display:inline-block}

/* RULES BOX */
.rules-box{max-width:1300px;margin:0 auto 40px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:20px}
.rules-box h4{font-size:13px;font-weight:700;margin-bottom:12px;color:var(--yellow);display:flex;align-items:center;gap:8px}
.rules-box .rule{font-size:11px;color:var(--text2);padding:5px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.rules-box .rule:last-child{border:none}
.rules-box .rule .r-icon{font-size:14px;flex-shrink:0}

/* ═══ UTILS ═══ */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .5s ease both}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}.d4{animation-delay:.2s}

@media(max-width:800px){
  .home-grid{grid-template-columns:1fr}
  .topnav .nav-pills{display:none}
  .iframe-wrap iframe{height:500px}
  .flow-pipeline{flex-direction:column}
  .flow-step-head{flex-direction:row}
  .flow-step-line{width:3px;height:20px;flex:none}
}
</style>
</head>

// ═══ RENDER HOME ═══
function renderHome() {
  const grid = document.getElementById('home-grid');
  grid.innerHTML = MOCKUPS.map((m,i) => `
    <div class="home-card anim d${i%4+1}" onclick="showMockup(${i})">
      <div class="hc-bar" style="background:${m.bar}"></div>
      <div class="hc-body">
        <div class="hc-icon">${m.icon}</div>
        <h3>${m.title}</h3>
        <div class="hc-desc">${m.desc}</div>
        <div class="hc-tags">${m.tags.map(t=>`<span class="tag" style="background:${t.color}18;color:${t.color}">${t.label}</span>`).join('')}</div>
      </div>
      <div class="hc-footer">
        <span>${m.flow.length} etapas de preenchimento</span>
        <span class="go">Ver formulário →</span>
      </div>
    </div>
  `).join('');
}

// ═══ RENDER MOCKUP PAGES ═══
function renderPages() {
  const container = document.getElementById('mockup-pages');
  container.innerHTML = MOCKUPS.map((m,i) => `
    <div class="section mockup-page" id="page-${m.id}">
      <!-- HEADER -->
      <div class="mp-header anim d1">
        <button class="btn-back" onclick="showHome()">◀ Voltar</button>
        <div class="mp-num" style="background:${m.color}">${m.num}</div>
        <div class="mp-icon">${m.icon}</div>
        <div class="mp-info">
          <h2>${m.title}</h2>
          <div class="mp-sub">${m.desc}</div>
        </div>
      </div>

      <!-- IFRAME -->
      <div class="iframe-wrap anim d2">
        <div class="iframe-toolbar">
          <div class="dots"><div class="dot" style="background:#FF5F57"></div><div class="dot" style="background:#FFBD2E"></div><div class="dot" style="background:#27C93F"></div></div>
          <div class="url-bar">${m.file}</div>
          <button class="btn-fs" onclick="openFullscreen('${m.file}')">⛶ Tela cheia</button>
        </div>
        <iframe data-src="${m.file}" loading="lazy"></iframe>
      </div>

      <!-- FLOW -->
      <div class="flow-section anim d3">
        <div class="flow-title">
          <div class="ft-icon" style="background:${m.color}20;color:${m.color}">📝</div>
          Fluxo de Preenchimento — ${m.title}
        </div>
        <div class="flow-pipeline">
          ${m.flow.map((step,si) => `
            <div class="flow-step">
              <div class="flow-step-head">
                <div class="flow-step-circle" style="background:${step.color}">${si+1}</div>
                <div class="flow-step-line" style="background:linear-gradient(90deg,${step.color},${m.flow[si+1]?m.flow[si+1].color:step.color})"></div>
              </div>
              <div class="flow-step-body">
                <h5>${step.title}</h5>
                <p>${step.desc}</p>
                <div class="fields">${step.fields.map(f=>`<span class="field-tag">${f}</span>`).join('')}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>

      <!-- RULES -->
      <div class="rules-box anim d4">
        <h4>⚡ Regras e Automações</h4>
        ${m.rules.map(r=>`<div class="rule"><span class="r-icon">${r.icon}</span>${r.text}</div>`).join('')}
      </div>
    </div>
  `).join('');
}

// ═══ NAVIGATION ═══
function showHome() {
  document.getElementById('home-section').style.display = '';
  document.querySelectorAll('.mockup-page').forEach(p => p.classList.remove('active'));
  updateNav(-1);
  window.scrollTo({top:0, behavior:'smooth'});
}

function showMockup(idx) {
  document.getElementById('home-section').style.display = 'none';
  document.querySelectorAll('.mockup-page').forEach(p => p.classList.remove('active'));
  
  const page = document.getElementById('page-' + MOCKUPS[idx].id);
  page.classList.add('active');
  
  // Lazy load iframe
  const iframe = page.querySelector('iframe');
  if (iframe && !iframe.src && iframe.dataset.src) {
    iframe.src = iframe.dataset.src;
  }
  
  updateNav(idx);
  window.scrollTo({top:0, behavior:'smooth'});
  
  // Retrigger animations
  page.querySelectorAll('.anim').forEach(el => {
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = '';
  });
}

function updateNav(idx) {
  document.querySelectorAll('.nav-pill').forEach((p,i) => {
    p.classList.toggle('active', i === idx + 1);
  });
}

function openFullscreen(file) {
  window.open(file, '_blank');
}

// ═══ INIT ═══
renderHome();
renderPages();
</script>
