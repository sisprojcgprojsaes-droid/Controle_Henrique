<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SISPROJ SAES — Atualização SISPROJ v2</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0B1120;--bg2:#111B2E;--bg3:#162234;--bg4:#1C2D42;--green:#2A9D8F;--green-d:#2A9D8F20;--blue:#1474B7;--opas:#0969C3;--orange:#D35400;--yellow:#F39C12;--purple:#8E44AD;--red:#CC2222;--teal:#17A2B8;--text:#E8ECF2;--text2:#9BB0C4;--muted:#5A7089;--border:#263D58;--font:'Sora',sans-serif;--mono:'IBM Plex Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}button{font-family:var(--font);cursor:pointer;border:none}a{text-decoration:none;color:inherit}

.topnav{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(11,17,32,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);z-index:200;display:flex;align-items:center;padding:0 20px;gap:12px}
.topnav .logo{font-size:14px;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:6px;flex-shrink:0}
.topnav .logo span{color:var(--green)}
.topnav .nav-pills{display:flex;gap:3px;overflow-x:auto;flex:1;padding:4px 0}
.nav-pill{padding:5px 10px;border-radius:6px;font-size:10px;font-weight:600;color:var(--muted);background:transparent;transition:all .2s;white-space:nowrap;border:1px solid transparent}
.nav-pill:hover{color:var(--text);background:var(--bg3)}
.nav-pill.active{color:#fff;border-color:var(--green);background:var(--green)}

.section{min-height:100vh;padding:72px 28px 40px;position:relative}
.home-hero{text-align:center;padding-top:40px;margin-bottom:36px}
.home-hero .label{font-size:12px;color:var(--green);font-weight:600;letter-spacing:3px;text-transform:uppercase;margin-bottom:10px}
.home-hero h1{font-size:40px;font-weight:800;letter-spacing:-.03em;margin-bottom:8px}
.home-hero h1 span{background:linear-gradient(135deg,var(--green),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.home-hero p{font-size:14px;color:var(--muted);max-width:600px;margin:0 auto;line-height:1.7}
.home-hero .ver{display:inline-flex;padding:4px 16px;border-radius:20px;font-size:11px;font-weight:600;background:var(--green-d);color:var(--green);font-family:var(--mono);margin-top:12px}

.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;max-width:1300px;margin:0 auto}
.home-card{background:var(--bg3);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:all .3s;cursor:pointer;position:relative}
.home-card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.3);border-color:rgba(42,157,143,.4)}
.home-card .hc-bar{height:4px}
.home-card .hc-body{padding:18px 20px}
.home-card .hc-icon{font-size:28px;margin-bottom:8px}
.home-card h3{font-size:15px;font-weight:700;margin-bottom:4px}
.home-card .hc-desc{font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:12px;min-height:36px}
.home-card .hc-tags{display:flex;gap:4px;flex-wrap:wrap}
.home-card .tag{font-size:9px;padding:2px 8px;border-radius:6px;font-weight:600}
.home-card .hc-footer{padding:10px 20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:10px;color:var(--muted)}
.home-card .hc-footer .go{color:var(--green);font-weight:600}

.mockup-page{display:none}.mockup-page.active{display:block}
.mp-header{max-width:1300px;margin:0 auto 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.mp-header .mp-num{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff}
.mp-header .mp-icon{font-size:28px}
.mp-header .mp-info{flex:1}
.mp-header h2{font-size:24px;font-weight:800;letter-spacing:-.02em}
.mp-header .mp-sub{font-size:12px;color:var(--muted)}
.btn-back{padding:6px 14px;border-radius:8px;font-size:11px;font-weight:600;color:var(--text2);border:1px solid var(--border);background:transparent;cursor:pointer}
.btn-back:hover{background:var(--bg3)}

.iframe-wrap{max-width:1300px;margin:0 auto 24px;border-radius:14px;overflow:hidden;border:2px solid var(--border);background:var(--bg2)}
.iframe-wrap iframe{width:100%;height:700px;border:none;display:block}
.iframe-toolbar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--bg3);border-bottom:1px solid var(--border)}
.iframe-toolbar .dots{display:flex;gap:5px}
.iframe-toolbar .dot{width:9px;height:9px;border-radius:50%}
.iframe-toolbar .url-bar{flex:1;padding:4px 12px;border-radius:5px;background:var(--bg);border:1px solid var(--border);font-size:10px;font-family:var(--mono);color:var(--muted)}
.iframe-toolbar .btn-fs{padding:3px 10px;border-radius:5px;background:var(--bg);border:1px solid var(--border);font-size:10px;color:var(--text2);cursor:pointer}
.iframe-toolbar .btn-fs:hover{background:var(--green);color:#fff;border-color:var(--green)}

.flow-section{max-width:1300px;margin:0 auto 24px}
.flow-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.flow-title .ft-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}
.flow-pipeline{display:flex;gap:0;align-items:stretch;overflow-x:auto;padding-bottom:8px}
.flow-step{flex:1;min-width:130px;position:relative;display:flex;flex-direction:column}
.flow-step-head{display:flex;align-items:center;margin-bottom:8px}
.flow-step-circle{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0;z-index:1}
.flow-step-line{flex:1;height:2px;margin:0 -2px}
.flow-step:last-child .flow-step-line{display:none}
.flow-step-body{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;flex:1}
.flow-step-body h5{font-size:11px;font-weight:700;margin-bottom:4px}
.flow-step-body p{font-size:9px;color:var(--muted);line-height:1.5}
.flow-step-body .fields{margin-top:6px;display:flex;flex-direction:column;gap:2px}
.flow-step-body .field-tag{font-size:8px;padding:1px 6px;border-radius:3px;background:var(--bg);color:var(--text2);font-family:var(--mono);display:inline-block}

.rules-box{max-width:1300px;margin:0 auto 32px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:16px}
.rules-box h4{font-size:12px;font-weight:700;margin-bottom:10px;color:var(--yellow);display:flex;align-items:center;gap:6px}
.rules-box .rule{font-size:10px;color:var(--text2);padding:4px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.rules-box .rule:last-child{border:none}

@media(max-width:1000px){.iframe-wrap iframe{height:500px}.flow-pipeline{flex-direction:column}.flow-step-line{display:none}}
@media(max-width:700px){.home-grid{grid-template-columns:1fr}.topnav .nav-pills{display:none}}
</style>
</head>

function renderHome(){
  // Nav pills
  document.getElementById('nav-pills').innerHTML='<button class="nav-pill active" onclick="showHome()">Início</button>'+M.map((m,i)=>'<button class="nav-pill" onclick="showMockup('+i+')">'+m.icon+' '+m.title.split(' ')[0]+'</button>').join('');
  // Grid
  document.getElementById('home-grid').innerHTML=M.map((m,i)=>`
    <div class="home-card" onclick="showMockup(${i})">
      <div class="hc-bar" style="background:${m.bar}"></div>
      <div class="hc-body">
        <div class="hc-icon">${m.icon}</div>
        <h3>${m.title}</h3>
        <div class="hc-desc">${m.desc}</div>
        <div class="hc-tags">${m.tags.map(t=>`<span class="tag" style="background:${t.c}18;color:${t.c}">${t.l}</span>`).join('')}</div>
      </div>
      <div class="hc-footer"><span>${m.flow.length} etapas</span><span class="go">Ver formulário →</span></div>
    </div>`).join('');
}

function renderPages(){
  document.getElementById('mockup-pages').innerHTML=M.map((m,i)=>`
    <div class="section mockup-page" id="page-${m.id}">
      <div class="mp-header">
        <button class="btn-back" onclick="showHome()">◀ Voltar</button>
        <div class="mp-num" style="background:${m.color}">${m.num}</div>
        <div class="mp-icon">${m.icon}</div>
        <div class="mp-info"><h2>${m.title}</h2><div class="mp-sub">${m.desc}</div></div>
      </div>
      <div class="iframe-wrap">
        <div class="iframe-toolbar">
          <div class="dots"><div class="dot" style="background:#FF5F57"></div><div class="dot" style="background:#FFBD2E"></div><div class="dot" style="background:#27C93F"></div></div>
          <div class="url-bar">${m.file}</div>
          <button class="btn-fs" onclick="window.open('${m.file}','_blank')">⛶ Tela cheia</button>
        </div>
        <iframe data-src="${m.file}" loading="lazy"></iframe>
      </div>
      <div class="flow-section">
        <div class="flow-title"><div class="ft-icon" style="background:${m.color}20;color:${m.color}">📝</div>Fluxo de Preenchimento — ${m.title}</div>
        <div class="flow-pipeline">${m.flow.map((s,si)=>`
          <div class="flow-step">
            <div class="flow-step-head"><div class="flow-step-circle" style="background:${s.c}">${si+1}</div><div class="flow-step-line" style="background:linear-gradient(90deg,${s.c},${m.flow[si+1]?m.flow[si+1].c:s.c})"></div></div>
            <div class="flow-step-body"><h5>${s.t}</h5><p>${s.d}</p><div class="fields">${s.f.map(f=>`<span class="field-tag">${f}</span>`).join('')}</div></div>
          </div>`).join('')}</div>
      </div>
      <div class="rules-box"><h4>⚡ Regras e Automações</h4>${m.rules.map(r=>`<div class="rule"><span>${r.i}</span>${r.t}</div>`).join('')}</div>
    </div>`).join('');
}

function showHome(){
  document.getElementById('home-section').style.display='';
  document.querySelectorAll('.mockup-page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-pill').forEach((p,i)=>p.classList.toggle('active',i===0));
  window.scrollTo({top:0,behavior:'smooth'});
}

function showMockup(idx){
  document.getElementById('home-section').style.display='none';
  document.querySelectorAll('.mockup-page').forEach(p=>p.classList.remove('active'));
  var page=document.getElementById('page-'+M[idx].id);
  page.classList.add('active');
  var iframe=page.querySelector('iframe');
  if(iframe&&!iframe.src&&iframe.dataset.src)iframe.src=iframe.dataset.src;
  document.querySelectorAll('.nav-pill').forEach((p,i)=>p.classList.toggle('active',i===idx+1));
  window.scrollTo({top:0,behavior:'smooth'});
}

renderHome();renderPages();
</script>
</body>
</html>
